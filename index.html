<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connect & Pool</title>

<!-- Tailwind (CDN, no build step) -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Map bare import specifiers to CDN ESM builds -->
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "lucide-react": "https://esm.sh/lucide-react@0.383.0?external=react"
  }
}
</script>

<!-- Babel Standalone: compiles JSX/ESM right in the browser -->
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

<style>
  html, body, #root { height: 100%; margin: 0; }
  body { background: #E7EEEC; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Your component, transpiled in-browser by Babel -->
<script type="text/babel" data-type="module" data-presets="react" src="./app.jsx"></script>

<!-- Entry point: mounts <App /> -->
<script type="text/babel" data-type="module" data-presets="react">
  import React from "react";
  import { createRoot } from "react-dom/client";
  import App from "./app.jsx";

  createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
