function makeIcon(renderInner) {
  return function IconComp({ size = 24, color = "currentColor", strokeWidth = 2, fill = "none", className, style }) {
    return (
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width={size}
        height={size}
        viewBox="0 0 24 24"
        fill={fill}
        stroke={color}
        strokeWidth={strokeWidth}
        strokeLinecap="round"
        strokeLinejoin="round"
        className={className}
        style={style}
      >
        {renderInner()}
      </svg>
    );
  };
}

const PLACES = [

  "LB Nagar", "Uppal", "Secunderabad Railway Station", "Mehdipatnam", "Madhapur",

];

  { id: "auto", label: "Auto", seats: 3, fare: 180, eta: 4 },
  { id: "cab", label: "Cab", seats: 4, fare: 380, eta: 6 },
  { id: "suv", label: "SUV", seats: 6, fare: 560, eta: 8 },
];

const AVATAR_COLORS = ["#0B4F4F", "#114B7A", "#8A4B0B", "#6A3D8F", "#1E6E4A", "#7A2E3D"];

function makeTravelers() {
  const names = [
    ["Ananya Rao", "AR", "Female"], ["Vikram Sinha", "VS", "Male"],
    ["Priya Menon", "PM", "Female"], ["Rahul Verma", "RV", "Male"],
    ["Sneha Iyer", "SI", "Female"], ["Karthik Reddy", "KR", "Male"],
    ["Divya Nair", "DN", "Female"], ["Arjun Kapoor", "AK", "Male"],
  ];
  return names.map((n, i) => ({
    id: i + 1,
    name: n[0],
    initials: n[1],
    gender: n[2],
    color: AVATAR_COLORS[i % AVATAR_COLORS.length],
    destination: PLACES[(i * 2 + 3) % PLACES.length],
    matchPercent: 96 - i * 4 - (i % 2 === 0 ? 0 : 3),
    verified: i % 3 !== 2,
    rating: (4.9 - i * 0.11).toFixed(1),
    timePosted: `${(i % 5) + 1} min ago`,
    phone: `+91 98${(10000000 + i * 137924).toString().slice(0, 8)}`,
  }));
}

/* ============================================================================
   Small shared UI primitives
   ============================================================================ */

function FlapText({ text, className = "", tone = "dark" }) {
  const bg = tone === "dark" ? "var(--ink)" : "var(--accent)";
  return (
    <span className={"flap-row " + className}>
      {text.split("").map((ch, i) => (
        <span
          key={i}
          className="flap-tile"
          style={{ animationDelay: `${i * 28}ms`, background: bg }}
        >
          {ch === " " ? "\u00A0" : ch}
        </span>
      ))}
    </span>
  );
}

function Avatar({ name, initials, color, size = 44 }) {
  return (
    <div
      className="rounded-full flex items-center justify-center font-semibold shrink-0"
      style={{
        width: size, height: size, background: color, color: "#fff",
        fontSize: size * 0.36, fontFamily: "'Space Grotesk', sans-serif",
      }}
      aria-label={name}
    >
      {initials}
    </div>
  );
}

function VerifiedBadge({ small }) {

}

}

    <div className="sticky bottom-0 z-20 flex border-t" style={{ background: "#fff", borderColor: "var(--line)" }}>
      {items.map((it) => {
        const active = screen === it.id;
        return (
          <button
            key={it.id}
            onClick={() => setScreen(it.id)}
            className="flex-1 flex flex-col items-center gap-1 py-2.5 relative"
          >
            <it.icon size={21} color={active ? "var(--primary)" : "var(--muted)"} strokeWidth={active ? 2.4 : 2} />
            <span className="text-xs font-medium" style={{ color: active ? "var(--primary)" : "var(--muted)" }}>{it.label}</span>

              <span className="absolute top-1.5 right-[28%] w-2 h-2 rounded-full" style={{ background: "var(--accent)" }} />

      })}

  );
}

/* ============================================================================
   2. LOCATION & DESTINATION SETUP
   ============================================================================ */

function LocationSetup({ goBack, onContinue }) {
  const [destination, setDestination] = useState("");
  const [showSuggestions, setShowSuggestions] = useState(false);
  const [flex, setFlex] = useState("now");
  const [rideType, setRideType] = useState("cab");

  const suggestions = destination
    ? PLACES.filter((p) => p.toLowerCase().includes(destination.toLowerCase()))
    : PLACES.slice(0, 5);

  return (
    <div className="flex flex-col min-h-full">
      <TopBar title="Set your trip" onBack={goBack} />
      <div className="px-5 py-5 flex-1">
        <label className="text-xs font-semibold tracking-wide" style={{ color: "var(--muted)" }}>YOU ARE AT</label>
        <div className="flex items-center gap-2.5 mt-2 mb-6 rounded-xl px-3.5 py-3" style={{ background: "var(--success-light)" }}>
          <div className="w-2 h-2 rounded-full animate-pulse" style={{ background: "var(--success)" }} />
          <span className="text-sm font-semibold flex-1" style={{ color: "var(--ink)" }}>{CURRENT_LOCATION}</span>
          <CheckCircle2 size={16} color="var(--success)" />
        </div>

        <label className="text-xs font-semibold tracking-wide" style={{ color: "var(--muted)" }}>WHERE ARE YOU HEADED</label>
        <div className="relative mt-2 mb-1">
          <Search size={16} className="absolute left-3.5 top-1/2 -translate-y-1/2" color="var(--muted)" />
          <input
            value={destination}
            onChange={(e) => { setDestination(e.target.value); setShowSuggestions(true); }}
            onFocus={() => setShowSuggestions(true)}
            placeholder="Search destination or landmark"
            className="w-full pl-10 pr-3 py-3.5 rounded-xl text-sm outline-none border"
            style={{ borderColor: "var(--line)", color: "var(--ink)" }}
          />
        </div>
        {showSuggestions && (
          <div className="rounded-xl border mb-6 overflow-hidden" style={{ borderColor: "var(--line)" }}>
            {suggestions.slice(0, 5).map((s) => (
              <button
                key={s}
                onClick={() => { setDestination(s); setShowSuggestions(false); }}
                className="w-full flex items-center gap-2.5 px-3.5 py-3 text-sm text-left border-b last:border-b-0"
                style={{ borderColor: "var(--line)", color: "var(--ink)" }}
              >
                <MapPin size={15} color="var(--muted)" />
                {s}
              </button>
            ))}
          </div>
        )}

        <label className="text-xs font-semibold tracking-wide" style={{ color: "var(--muted)" }}>TRAVEL TIME FLEXIBILITY</label>
        <div className="grid grid-cols-3 gap-2 mt-2 mb-6">
          {[["now", "Now"], ["15", "Within 15 min"], ["30", "Within 30 min"]].map(([id, label]) => (
            <button
              key={id}
              onClick={() => setFlex(id)}
              className="rounded-xl py-3 text-xs font-semibold border text-center"
              style={{
                borderColor: flex === id ? "var(--primary)" : "var(--line)",
                background: flex === id ? "var(--primary)" : "#fff",
                color: flex === id ? "#fff" : "var(--ink)",
              }}
            >
              {label}
            </button>
          ))}
        </div>

        <label className="text-xs font-semibold tracking-wide" style={{ color: "var(--muted)" }}>RIDE TYPE PREFERENCE</label>
        <div className="flex gap-2 mt-2 mb-8">
          {VEHICLES.map((v) => (
            <button
              key={v.id}
              onClick={() => setRideType(v.id)}
              className="flex-1 rounded-xl py-3 border flex flex-col items-center gap-1"
              style={{
                borderColor: rideType === v.id ? "var(--primary)" : "var(--line)",
                background: rideType === v.id ? "var(--primary-tint)" : "#fff",
              }}
            >
              <Car size={17} color={rideType === v.id ? "var(--primary)" : "var(--muted)"} />
              <span className="text-xs font-semibold" style={{ color: "var(--ink)" }}>{v.label}</span>
            </button>
          ))}
        </div>
      </div>
      <div className="px-5 pb-6">
        <PrimaryButton disabled={!destination} onClick={() => onContinue({ destination, flex, rideType })} icon={Search}>
          Find Matches
        </PrimaryButton>
      </div>
    </div>
  );
}

function RadarScan() {
  return (
    <div className="relative w-40 h-40 mx-auto my-8 flex items-center justify-center">

function MatchFeed({ trip, travelers, requestStatuses, onQuickConnect, onOpenTraveler, goBack }) {
  const [scanning, setScanning] = useState(true);
  const [sortBy, setSortBy] = useState("match");
  const [genderFilter, setGenderFilter] = useState("any");
  const [showFilters, setShowFilters] = useState(false);

  useEffect(() => {
    const t = setTimeout(() => setScanning(false), 1700);
    return () => clearTimeout(t);
  }, []);

  let list = travelers.filter((t) => genderFilter === "any" || t.gender === genderFilter);
  list = [...list].sort((a, b) => sortBy === "match" ? b.matchPercent - a.matchPercent : a.timePosted.localeCompare(b.timePosted));

  return (
    <div className="flex flex-col min-h-full">
      <TopBar
        title={trip?.destination ? `Nearby → ${trip.destination}` : "Nearby travelers"}
        onBack={goBack}
        right={
          <button onClick={() => setShowFilters((s) => !s)} className="p-1.5 rounded-full active:bg-black/5">
            <SlidersHorizontal size={18} color="var(--ink)" />
          </button>
        }
      />

      {showFilters && (
        <div className="px-4 py-3 border-b flex flex-wrap gap-2" style={{ borderColor: "var(--line)", background: "#fff" }}>
          {[["match", "Best match"], ["time", "Most recent"]].map(([id, label]) => (
            <button key={id} onClick={() => setSortBy(id)} className="px-3 py-1.5 rounded-full text-xs font-medium border"
              style={{ borderColor: sortBy === id ? "var(--primary)" : "var(--line)", background: sortBy === id ? "var(--primary-tint)" : "#fff", color: "var(--ink)" }}>
              {label}
            </button>
          ))}
          {[["any", "Any gender"], ["Female", "Women only"], ["Male", "Men only"]].map(([id, label]) => (
            <button key={id} onClick={() => setGenderFilter(id)} className="px-3 py-1.5 rounded-full text-xs font-medium border"
              style={{ borderColor: genderFilter === id ? "var(--primary)" : "var(--line)", background: genderFilter === id ? "var(--primary-tint)" : "#fff", color: "var(--ink)" }}>
              {label}
            </button>
          ))}
        </div>
      )}

      {scanning ? (
        <div className="flex-1 flex flex-col items-center justify-center px-6">
          <RadarScan />
          <p className="font-semibold text-sm" style={{ color: "var(--ink)", fontFamily: "'Space Grotesk', sans-serif" }}>Scanning for co-travelers…</p>
          <p className="text-xs mt-1" style={{ color: "var(--muted)" }}>Matching people near {CURRENT_LOCATION.split("·")[0].trim()}</p>
        </div>
      ) : list.length === 0 ? (
        <EmptyState
          icon={Users}
          title="No co-travelers nearby right now"
          subtitle="Try widening your time window to catch more people heading your way."
          action={<SecondaryButton onClick={() => setGenderFilter("any")}>Widen time window</SecondaryButton>}
        />
      ) : (
        <div className="flex-1 px-4 py-4 flex flex-col gap-2.5 overflow-y-auto">
          <p className="text-xs mb-1" style={{ color: "var(--muted)" }}>{list.length} travelers match your route</p>
          {list.map((t) => (
            <MatchCard key={t.id} traveler={t} status={requestStatuses[t.id]} onQuickConnect={onQuickConnect} onOpen={onOpenTraveler} />
          ))}
        </div>
      )}
    </div>
  );
}

  return (
    <div className="flex flex-col min-h-full">

          <div className="rounded-xl border p-3 flex items-center gap-2" style={{ borderColor: "var(--line)" }}>
            <CheckCircle2 size={15} color="var(--success)" /><span className="text-xs font-medium" style={{ color: "var(--ink)" }}>ID Verified</span>
          </div>
          <div className="rounded-xl border p-3 flex items-center gap-2" style={{ borderColor: "var(--line)" }}>
            <CheckCircle2 size={15} color="var(--success)" /><span className="text-xs font-medium" style={{ color: "var(--ink)" }}>Phone Verified</span>
          </div>
        </div>

        <p className="text-xs font-semibold tracking-wide mb-2" style={{ color: "var(--muted)" }}>DEFAULT DESTINATIONS</p>
        <div className="flex gap-2 mb-6">
          <input value={prefs.home} onChange={(e) => setPrefs({ ...prefs, home: e.target.value })} placeholder="Home" className="flex-1 rounded-xl border px-3 py-2.5 text-sm outline-none" style={{ borderColor: "var(--line)" }} />
          <input value={prefs.work} onChange={(e) => setPrefs({ ...prefs, work: e.target.value })} placeholder="Work" className="flex-1 rounded-xl border px-3 py-2.5 text-sm outline-none" style={{ borderColor: "var(--line)" }} />
        </div>

        <p className="text-xs font-semibold tracking-wide mb-2" style={{ color: "var(--muted)" }}>DEFAULT RIDE TYPE</p>
        <div className="flex gap-2 mb-6">
          {VEHICLES.map((v) => (
            <button key={v.id} onClick={() => setPrefs({ ...prefs, rideType: v.id })} className="flex-1 rounded-xl py-2.5 text-xs font-semibold border" style={{ borderColor: prefs.rideType === v.id ? "var(--primary)" : "var(--line)", background: prefs.rideType === v.id ? "var(--primary-tint)" : "#fff", color: "var(--ink)" }}>
              {v.label}
            </button>
          ))}
        </div>

        <p className="text-xs font-semibold tracking-wide mb-2" style={{ color: "var(--muted)" }}>CO-TRAVELER GENDER PREFERENCE</p>
        <div className="flex gap-2 mb-6">
          {[["any", "Any"], ["Female", "Women only"], ["Male", "Men only"]].map(([id, label]) => (
            <button key={id} onClick={() => setPrefs({ ...prefs, gender: id })} className="flex-1 rounded-xl py-2.5 text-xs font-semibold border" style={{ borderColor: prefs.gender === id ? "var(--primary)" : "var(--line)", background: prefs.gender === id ? "var(--primary-tint)" : "#fff", color: "var(--ink)" }}>
              {label}
            </button>
          ))}
        </div>

        <p className="text-xs font-semibold tracking-wide mb-2" style={{ color: "var(--muted)" }}>RIDE HISTORY</p>
        <div className="rounded-2xl border mb-4 overflow-hidden" style={{ borderColor: "var(--line)" }}>
          {rideHistory.map((r, i) => (
            <div key={i} className="flex items-center justify-between px-3.5 py-3" style={{ borderTop: i ? "1px solid var(--line)" : "none" }}>
              <div>
                <p className="text-sm font-medium" style={{ color: "var(--ink)" }}>{r.to}</p>
                <p className="text-xs" style={{ color: "var(--muted)" }}>{r.date} · {r.people} people</p>
              </div>
              <span className="text-sm font-semibold" style={{ fontFamily: "'IBM Plex Mono', monospace", color: "var(--ink)" }}>₹{r.paid}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ============================================================================
   8. RATINGS & FEEDBACK
   ============================================================================ */

function StarPicker({ value, onChange }) {
  return (
    <div className="flex gap-1">
      {[1, 2, 3, 4, 5].map((n) => (
        <button key={n} onClick={() => onChange(n)}>
          <Star size={22} fill={n <= value ? "var(--warn)" : "none"} color={n <= value ? "var(--warn)" : "var(--line)"} />
        </button>
      ))}
    </div>
  );
}

function RatingsFeedback({ group, driverName, goDone }) {
  const [ratings, setRatings] = useState({});
  const [feedback, setFeedback] = useState("");
  const [flag, setFlag] = useState(false);
  const [submitted, setSubmitted] = useState(false);

  const targets = [{ id: "driver", name: driverName, isDriver: true }, ...group.filter((g) => !g.isSelf)];

  if (submitted) {
    return (
      <div className="flex flex-col min-h-full items-center justify-center px-8 text-center">
        <div className="w-16 h-16 rounded-full flex items-center justify-center mb-4" style={{ background: "var(--success-light)" }}>
          <CheckCircle2 size={30} color="var(--success)" />
        </div>
        <p className="font-semibold text-lg mb-1" style={{ color: "var(--ink)", fontFamily: "'Space Grotesk', sans-serif" }}>Thanks for the feedback</p>
        <p className="text-sm mb-6" style={{ color: "var(--muted)" }}>It helps keep Connect & Pool safe and trustworthy for everyone.</p>
        <PrimaryButton onClick={goDone}>Back to Nearby</PrimaryButton>
      </div>
    );
  }

  return (
    <div className="flex flex-col min-h-full">
      <TopBar title="Rate your ride" />
      <div className="flex-1 px-5 py-5 overflow-y-auto">
        {targets.map((t) => (
          <div key={t.id} className="rounded-2xl border p-4 mb-3 flex items-center justify-between" style={{ borderColor: "var(--line)" }}>
            <div className="flex items-center gap-3">
              <Avatar name={t.name} initials={t.initials || t.name.split(" ").map((w) => w[0]).join("")} color={t.color || "var(--primary)"} size={38} />
              <div>
                <p className="text-sm font-semibold" style={{ color: "var(--ink)" }}>{t.name}</p>
                <p className="text-xs" style={{ color: "var(--muted)" }}>{t.isDriver ? "Driver" : "Co-traveler"}</p>
              </div>
            </div>
            <StarPicker value={ratings[t.id] || 0} onChange={(v) => setRatings((r) => ({ ...r, [t.id]: v }))} />
          </div>
        ))}

        <textarea
          value={feedback}
          onChange={(e) => setFeedback(e.target.value)}
          placeholder="Optional feedback about your ride…"
          className="w-full rounded-xl border p-3.5 text-sm outline-none mt-2 mb-4 resize-none"
          style={{ borderColor: "var(--line)", height: 90 }}
        />

        <button onClick={() => setFlag((f) => !f)} className="w-full flex items-center gap-2.5 rounded-xl border p-3.5" style={{ borderColor: flag ? "#C23B3B" : "var(--line)", background: flag ? "#FDECEC" : "#fff" }}>
          <Flag size={15} color={flag ? "#C23B3B" : "var(--muted)"} />
          <span className="text-sm flex-1 text-left" style={{ color: flag ? "#C23B3B" : "var(--ink)" }}>Report a safety concern</span>
          <div className="w-4 h-4 rounded border flex items-center justify-center" style={{ borderColor: flag ? "#C23B3B" : "var(--line)", background: flag ? "#C23B3B" : "transparent" }}>
            {flag && <CheckCircle2 size={12} color="#fff" />}
          </div>
        </button>
      </div>
      <div className="px-5 pb-6">
        <PrimaryButton onClick={() => setSubmitted(true)}>Submit</PrimaryButton>
      </div>
    </div>
  );
}

/* ============================================================================
   ROOT APP
   ============================================================================ */

function App() {
  const [screen, setScreen] = useState("landing");
  const [history, setHistory] = useState([]);
  const [trip, setTrip] = useState(null);
  const [travelers] = useState(makeTravelers());
  const [requestStatuses, setRequestStatuses] = useState({});
  const [activeTraveler, setActiveTraveler] = useState(null);
  const [connectedList, setConnectedList] = useState([]);
  const [group, setGroup] = useState([]);
  const [booking, setBooking] = useState(null);
  const timers = useRef({});

  function go(next) {
    setHistory((h) => [...h, screen]);
    setScreen(next);
  }
  function back() {
    setHistory((h) => {
      const copy = [...h];
      const prev = copy.pop() || "landing";
      setScreen(prev);
      return copy;
    });
  }

  function quickConnect(traveler) {
    if (requestStatuses[traveler.id]) return;
    setRequestStatuses((s) => ({ ...s, [traveler.id]: "pending" }));
    setActiveTraveler(traveler);
    go("request");
    clearTimeout(timers.current[traveler.id]);
    timers.current[traveler.id] = setTimeout(() => {
      setRequestStatuses((s) => ({ ...s, [traveler.id]: "accepted" }));
      setConnectedList((l) => (l.find((x) => x.id === traveler.id) ? l : [...l, traveler]));
    }, 2200);
  }

  function openTraveler(traveler) {
    setActiveTraveler(traveler);
    if (requestStatuses[traveler.id]) go("request");
  }

  function onAcceptedOpenChat(traveler) {
    go("chat");
  }

  function proceedToGroup() {
    const selfMember = { id: "self", name: "Aditya Sharma", initials: "AS", color: "var(--primary)", verified: true, rating: "4.9", isSelf: true };
    const members = [selfMember, ...connectedList.slice(0, 3)];
    setGroup(members);
    go("group");
  }

  const rideHistory = [
    { to: "Gachibowli", date: "2 Jul", people: 3, paid: 140 },
    { to: "Secunderabad Stn", date: "27 Jun", people: 2, paid: 190 },
    { to: "Hitech City", date: "19 Jun", people: 4, paid: 95 },
  ];

  let content;
  if (screen === "landing") content = <LandingPage goNext={() => go("location")} />;
  else if (screen === "location") content = <LocationSetup goBack={back} onContinue={(t) => { setTrip(t); go("feed"); }} />;
  else if (screen === "feed") content = (
    <MatchFeed trip={trip} travelers={travelers} requestStatuses={requestStatuses} onQuickConnect={quickConnect} onOpenTraveler={openTraveler} goBack={back} />
  );
  else if (screen === "request") content = (
    <ConnectRequestScreen
      traveler={activeTraveler}
      status={requestStatuses[activeTraveler?.id]}
      onAccepted={onAcceptedOpenChat}
      goBack={back}
      onOpenReceiverPreview={() => go("receiverPreview")}
    />
  );
  else if (screen === "receiverPreview") content = <ReceiverPreviewScreen goBack={back} />;
  else if (screen === "chat") content = <ChatScreen traveler={activeTraveler} goBack={back} />;
  else if (screen === "group") content = <GroupBooking group={group} trip={trip} goBack={back} onBook={(b) => { setBooking(b); go("summary"); }} />;
  else if (screen === "summary") content = <RideSummary group={group} booking={booking} trip={trip} goBack={back} onCompleteRide={() => go("rating")} />;
  else if (screen === "profile") content = <ProfilePage goBack={back} rideHistory={rideHistory} />;
  else if (screen === "rating") content = <RatingsFeedback group={group} driverName="Suresh Kumar" goDone={() => { setHistory([]); setScreen("feed"); }} />;
  else content = <LandingPage goNext={() => go("location")} />;

  const showBottomNav = ["feed", "profile"].includes(screen) || (screen === "chat" && connectedList.length);
  const showConnectShortcut = connectedList.length > 0 && screen === "feed";

  return (
    <div className="w-full h-full flex items-center justify-center" style={{ background: "#E7EEEC", fontFamily: "'Inter', sans-serif", minHeight: 640 }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

        :root {
          --bg: #F5F9F8;
          --ink: #0A1F1C;
          --primary: #0B4F4F;
          --primary-dark: #073030;
          --primary-tint: #E4F0EE;
          --accent: #FF6B35;
          --success: #1E9E6D;
          --success-light: #E4F5EC;
          --warn: #E0A100;
          --line: #DCE8E6;
          --muted: #5B7370;
        }

        .flap-row { display: inline-flex; gap: 2px; }
        .flap-tile {
          display: inline-block; color: #fff; font-family: 'IBM Plex Mono', monospace;
          font-weight: 600; padding: 3px 4px; border-radius: 4px;
          transform: translateY(-6px) rotateX(55deg); opacity: 0;
          animation: flapIn 0.4s ease forwards;
        }
        @keyframes flapIn { to { transform: none; opacity: 1; } }

        @keyframes radarPulse {
          0% { transform: scale(0.3); opacity: 0.55; }
          100% { transform: scale(1); opacity: 0; }
        }
        @keyframes radarSweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        * { -webkit-tap-highlight-color: transparent; }
        button:focus-visible, input:focus-visible, textarea:focus-visible {
          outline: 2px solid var(--primary); outline-offset: 2px;
        }
        @media (prefers-reduced-motion: reduce) {
          .flap-tile, [style*="animation"] { animation: none !important; }
        }
      `}</style>

      <div className="relative w-full flex flex-col overflow-hidden" style={{ maxWidth: 430, height: 800, background: "var(--bg)", borderRadius: 28, boxShadow: "0 30px 60px -20px rgba(10,30,28,0.35)", border: "1px solid rgba(10,30,28,0.06)" }}>
        <div className="flex-1 flex flex-col overflow-y-auto">{content}</div>
        {showConnectShortcut && (
          <button
            onClick={proceedToGroup}
            className="absolute bottom-24 right-4 rounded-full px-4 py-3 flex items-center gap-2 font-semibold text-sm shadow-lg"
            style={{ background: "var(--accent)", color: "#fff" }}
          >
            <Users size={16} /> Form group ({connectedList.length + 1})
          </button>
        )}
        {showBottomNav && <BottomNav screen={screen} setScreen={(s) => { setHistory([]); setScreen(s); }} requestCount={connectedList.length} />}
      </div>
    </div>
  );
}

const rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(<App />);

</script>
</body>
</html>
